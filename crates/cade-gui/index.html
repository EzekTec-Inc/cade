<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CADE Dashboard</title>
<style>
  :root { color-scheme: dark; }
  body {
    font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
    background: #0f1115;
    color: #e5e7eb;
    margin: 0;
    padding: 0;
    overflow: hidden;
  }
</style>
<!-- Add Tailwind CSS for pixel-perfect design matching CADE -->
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          cadeDark: '#0f1115',
          cadeCard: '#16171d',
          cadeBorder: '#272833',
          cadeAccent: '#ff7c5c',
        }
      }
    }
  }
</script>
<link data-trunk rel="rust" data-wasm-opt="0" />
</head>
<body class="bg-[#0f1115] text-[#e5e7eb]">
<div id="cade_gui_canvas" class="h-screen w-screen flex"></div>
</body>
</html>
