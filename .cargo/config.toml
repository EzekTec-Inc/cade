# CADE build configuration — sccache + mold linker for faster builds.
#
# sccache: Caches compiled crate artifacts across builds.
#   Cold build with warm cache: ~2-3 min instead of >15 min.
#
# mold: Faster linker than GNU ld (debug binary is 315 MB).
#   Link time: ~2 sec instead of ~5 sec.

[build]
rustc-wrapper = "sccache"

[target.x86_64-unknown-linux-gnu]
rustflags = ["-C", "link-arg=-fuse-ld=mold"]
