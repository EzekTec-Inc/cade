# CADE build configuration
#
# Optional: For faster rebuilds on Linux, install sccache + mold:
#   cargo install sccache && sudo apt install mold
#   export RUSTC_WRAPPER=sccache
#
# The mold linker flag below is target-scoped to Linux only and
# is silently ignored on Windows/macOS.

[target.x86_64-unknown-linux-gnu]
rustflags = ["-C", "link-arg=-fuse-ld=lld"]
